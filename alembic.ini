# Alembic configuration for BugFund.
# The DB URL is injected at runtime by control_plane/migrations/env.py
# (read from APP_DATABASE_URL / .env), overriding the placeholder below.

[alembic]
script_location = control_plane/migrations
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg2://bugfund:bugfund@localhost:5432/bugfund

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
